name: classipod
description: "A ipod Classic Emulator"

publish_to: 'none'

version: 1.12.0+25

environment:
  sdk: ^3.9.2
  flutter: 3.35.7

dependencies:
  audio_metadata_reader: ^1.4.2
  audio_service: ^0.18.18
  battery_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  device_preview_plus: ^2.5.3
  file_picker: ^10.3.3
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  go_router: ^16.3.0
  hive_ce: ^2.15.1
  hive_ce_flutter: ^2.3.3
  intl: any
  just_audio: ^0.10.5
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  tutorial_coach_mark: ^1.3.3
  url_launcher: ^6.3.2
  volume_controller: ^3.4.0

dev_dependencies:
  build_runner: ^2.10.1
  custom_lint: ^0.8.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  hive_ce_generator: ^1.10.0
  riverpod_lint: ^3.0.3

dependency_overrides:
  analyzer: ^8.4.0
  intl: 0.20.2

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/
    - assets/fonts/
    - assets/images/

  fonts:
    - family: Helvetica
      fonts:
        - asset: assets/fonts/Helvetica.ttf
        - asset: assets/fonts/Helvetica-Bold.ttf
          weight: 700